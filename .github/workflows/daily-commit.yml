name: Daily Automated Commit

on:
  schedule:
    - cron: '17 3 * * *'   # Runs daily at 03:17 UTC
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 23f3003781@ds.study.iitm.ac.in
        run: echo "Automated workflow running"

      - name: Create daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f3003781@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit"
          git push
